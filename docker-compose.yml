services:
  bitcoind:
    image: lncm/bitcoind:v28.0
    volumes:
      - ./bitcoin.conf:/data/.bitcoin/bitcoin.conf
      - bitcoind-data:/data/.bitcoin
    ports:
      - "18443:18443"
      - "18444:18444"
    restart: unless-stopped

  esplora:
    image: blockstream/esplora:latest-arm64
    command: >
      /srv/explorer/electrs_bitcoin/bin/electrs
      --network regtest
      --daemon-dir /data/.bitcoin
      --daemon-rpc-addr bitcoind:18443
      --cookie user:password
      --http-addr 0.0.0.0:3002
      --cors '*'
      -vv
    volumes:
      - bitcoind-data:/data/.bitcoin:ro
    ports:
      - "3002:3002"
    depends_on:
      - bitcoind
    restart: unless-stopped

volumes:
  bitcoind-data:
